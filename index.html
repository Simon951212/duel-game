<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>是男人就来单挑</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- 背景 -->
  <div class="game-bg"></div>

  <!-- 悬浮篮球（已将 small/medium/large 修正为 CSS 中的 size-* 类名） -->
  <div class="floating-ball size-sm orange" style="top:12%;left:8%"></div>
  <div class="floating-ball size-md brown" style="top:28%;right:12%"></div>
  <div class="floating-ball size-sm blue" style="top:50%;left:5%"></div>
  <div class="floating-ball size-lg orange" style="bottom:35%;right:8%"></div>
  <div class="floating-ball size-sm brown" style="top:40%;right:25%"></div>
  <div class="floating-ball size-md orange" style="bottom:20%;left:10%"></div>

  <!-- 大篮球 -->
  <div class="big-basketball"></div>

  <!-- 地板 -->
  <div class="game-floor"></div>

  <div class="app-container">
    <div id="screen-home" class="screen home-screen active">
      <div class="game-title">是男人就来单挑</div>
      <div class="game-subtitle">🏀 跨时代篮球梦幻组队 🏀</div>

      <div class="home-ball"></div>

      <div class="home-buttons">
        <button class="btn-3d orange" onclick="startGame()">🏀 开始组队</button>
        <button class="btn-3d dark small" onclick="openHistoryFromHome()">📋 历史战绩</button>
      </div>

      <div class="rules-card">
        <h3>🎮 怎么玩？</h3>
        <p><span class="emoji">🎰</span>每轮随机摇出一支球队+年代</p>
        <p><span class="emoji">👆</span>从球员列表中选一个加入你的阵容</p>
        <p><span class="emoji">🏆</span>5个位置集齐后，算出你的赛季战绩</p>
        <p><span class="emoji">⚔️</span>选择对手进行7场4胜制单挑</p>
        <p><span class="emoji">📤</span>生成战绩海报和分享链接，邀请好友来挑战！</p>
      </div>
    </div>

    <div id="screen-game" class="screen game-screen">
      <div class="game-header">
        <span class="round-label" id="roundLabel">第 1 / 5 轮</span>
        <div class="skip-badges">
          <span class="skip-badge">跳过球队: <span id="skipTeamCount">1次</span></span>
          <span class="skip-badge">跳过年代: <span id="skipDecadeCount">1次</span></span>
        </div>
      </div>

      <!-- 阵容栏 -->
      <div class="roster-bar" id="rosterBar"></div>

      <!-- 老虎机 -->
      <div class="slot-machine">
        <div class="reel-container" id="teamReel">
          <span class="reel-label">球队</span>
          <span class="reel-text" id="teamReelText">???</span>
        </div>
        <div class="reel-container" id="decadeReel">
          <span class="reel-label">年代</span>
          <span class="reel-text" id="decadeReelText">???</span>
        </div>
      </div>

      <div class="action-buttons">
        <button class="btn-3d orange" id="spinBtn" onclick="spinSlot()">🎲 随机</button>
        <button class="btn-3d dark small" id="skipTeamBtn" onclick="directSkip('team')" disabled>换球队</button>
        <button class="btn-3d dark small" id="skipDecadeBtn" onclick="directSkip('decade')" disabled>换年代</button>
      </div>

      <p class="player-hint" id="playerHint"></p>

      <!-- 球员列表 -->
      <div id="playerSection" style="display:none;">
        <div class="filter-tabs">
          <button class="filter-tab active" data-tab="all" onclick="setFilterTab('all')">全部</button>
          <button class="filter-tab" data-tab="g" onclick="setFilterTab('g')">后卫</button>
          <button class="filter-tab" data-tab="f" onclick="setFilterTab('f')">前锋</button>
          <button class="filter-tab" data-tab="c" onclick="setFilterTab('c')">中锋</button>
        </div>
        <div class="player-grid" id="playerGrid"></div>
      </div>
    </div>

    <div id="screen-result" class="screen result-screen">
      <div class="result-header">
        <div class="label">预测战绩</div>
        <div class="result-record" id="finalRecord">--</div>
        <div class="result-grade" id="resultGrade">-</div>
        <div class="result-tier" id="resultTier">--</div>
      </div>

      <div class="result-roster" id="rosterFinal"></div>

      <!-- 分享链接显示区 -->
      <div id="shareLinkArea" style="display:none;background:rgba(255,255,255,0.06);border-radius:12px;padding:12px;margin-bottom:16px;text-align:center;">
        <div style="font-size:12px;color:rgba(255,255,255,0.5);margin-bottom:6px;">🔗 分享链接</div>
        <div id="shareLinkUrl" style="font-size:13px;color:var(--orange-light);word-break:break-all;margin-bottom:8px;"></div>
        <button class="btn-3d orange small" onclick="copyShareLink()">📋 复制链接</button>
      </div>

      <div class="result-buttons-group">
        <button class="btn-3d orange" onclick="showPoster()">📷 生成海报</button>
        <button class="btn-3d dark" onclick="shareResult()">📤 分享战绩</button>
        <button class="btn-3d dark" onclick="startGame()">🔄 重新创建队伍</button>
        <button class="btn-3d orange" onclick="openHistory()">📋 历史战绩</button>
        <button class="btn-3d dark full-width" onclick="startChallenge()">⚔️ 单挑挑战</button>
      </div>
    </div>

    <div id="screen-history" class="screen result-screen">
      <div class="result-header">
        <div class="label" style="font-size:24px;">📋 历史战绩</div>
      </div>
      <div id="historyList" style="max-height:55vh;overflow-y:auto;padding:8px;"></div>
      <div class="result-buttons-group" style="margin-top:16px;">
        <button class="btn-3d orange full-width" onclick="startGame()">🔄 重新创建队伍</button>
        <button class="btn-3d dark" onclick="showScreen('screen-result')">⬅️ 返回</button>
        <button class="btn-3d dark" onclick="showScreen('screen-home')">🏠 首页</button>
      </div>
    </div>

    <div id="screen-select" class="screen result-screen">
      <div class="result-header">
        <div class="label" style="font-size:20px;">⚔️ 选择挑战对手</div>
      </div>
      <div id="teamSelectList" style="max-height:55vh;overflow-y:auto;padding:8px;"></div>
      <div class="result-buttons-group" style="margin-top:16px;">
        <button class="btn-3d dark" onclick="showScreen('screen-result')">⬅️ 返回</button>
        <button class="btn-3d dark" onclick="showScreen('screen-home')">🏠 首页</button>
      </div>
    </div>

    <div id="screen-challenge" class="screen result-screen">
      <div class="result-header">
        <div class="label" style="font-size:20px;">⚔️ 7场4胜单挑</div>
      </div>
      <div class="challenge-vs" id="challengeVs">
        <div id="challengeMyTeam" class="challenge-team"></div>
        <div class="vs-text">VS</div>
        <div id="challengeCpuTeam" class="challenge-team"></div>
      </div>
      <div id="challengeGames" style="margin-bottom:16px;"></div>
      <div id="challengeResult" style="text-align:center;"></div>
      <div class="result-buttons-group" style="margin-top:16px;">
        <button class="btn-3d orange full-width" onclick="startGame()">🔄 重新创建队伍</button>
        <button class="btn-3d dark" onclick="startChallenge()">⚔️ 再来一局挑战</button>
        <button class="btn-3d dark" onclick="showScreen('screen-home')">🏠 首页</button>
      </div>
    </div>

    <div class="poster-container" id="posterOverlay">
      <div class="poster" id="posterContent"></div>
      <div class="poster-actions">
        <button class="btn-3d orange" onclick="downloadPoster()">💾 下载海报</button>
        <button class="btn-3d dark" onclick="closePoster()">关闭</button>
      </div>
    </div>
  </div>

  <canvas id="posterCanvas" style="display:none;"></canvas>

  <script src="js/nba-data.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
